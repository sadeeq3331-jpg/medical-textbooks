<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Site Verification -->
    <meta name="google-site-verification" content="9595657076711413" />
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedLib · Free Medical Textbook Library</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: #f0f7ff;
            min-height: 100vh;
        }
        
        /* Header/Navigation */
        .header {
            background: linear-gradient(135deg, #0a2942, #1b4c72);
            color: white;
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
        }
        
        .logo i {
            color: #ffd966;
            font-size: 2rem;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        
        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        
        .nav-links a:hover {
            opacity: 0.8;
        }
        
        .donate-btn {
            background: #ffd966;
            color: #0a2942 !important;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
        }
        
        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #1b4c72, #2c7cb0);
            color: white;
            padding: 4rem 5%;
            text-align: center;
        }
        
        .hero-content {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 800;
        }
        
        .hero p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .search-bar {
            background: white;
            border-radius: 50px;
            padding: 0.5rem;
            display: flex;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .search-bar input {
            flex: 1;
            border: none;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            border-radius: 50px;
            outline: none;
        }
        
        .search-bar button {
            background: #ffd966;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .search-bar button:hover {
            transform: scale(1.05);
        }
        
        /* Main Content */
        .main-content {
            max-width: 1400px;
            margin: 3rem auto;
            padding: 0 5%;
        }
        
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .section-title h2 {
            font-size: 2rem;
            color: #0a2942;
            font-weight: 700;
        }
        
        .view-all {
            color: #2c7cb0;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Book Grid */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }
        
        .book-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .book-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2);
        }
        
        .book-cover {
            height: 200px;
            background: linear-gradient(135deg, #1b4c72, #2c7cb0);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .book-cover i {
            font-size: 5rem;
            color: #ffd966;
            opacity: 0.8;
        }
        
        .book-category {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #ffd966;
            color: #0a2942;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .book-info {
            padding: 1.5rem;
        }
        
        .book-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0a2942;
            margin-bottom: 0.5rem;
        }
        
        .book-author {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .book-stats {
            display: flex;
            gap: 1rem;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .book-stats i {
            color: #2c7cb0;
            margin-right: 0.3rem;
        }
        
        .read-btn {
            background: #2c7cb0;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .read-btn:hover {
            background: #1b4c72;
        }
        
        /* Categories Section */
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin: 3rem 0;
        }
        
        .category-card {
            background: white;
            padding: 2rem 1rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 20px -5px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .category-card:hover {
            transform: scale(1.05);
            background: #2c7cb0;
            color: white;
        }
        
        .category-card:hover i {
            color: white;
        }
        
        .category-card:hover p {
            color: white !important;
        }
        
        .category-card i {
            font-size: 2.5rem;
            color: #2c7cb0;
            margin-bottom: 1rem;
        }
        
        .category-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .category-card p {
            color: #666;
            margin-top: 0.5rem;
        }
        
        /* Book Page (hidden by default) */
        .book-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 1000;
            overflow-y: auto;
        }
        
        .book-page iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .close-book {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff6b6b;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .close-book:hover {
            background: #ff5252;
        }
        
        /* Footer */
        .footer {
            background: #0a2942;
            color: white;
            padding: 3rem 5%;
            margin-top: 4rem;
        }
        
        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 3rem;
        }
        
        .footer-section h3 {
            margin-bottom: 1.5rem;
            color: #ffd966;
        }
        
        .footer-section a {
            color: white;
            text-decoration: none;
            display: block;
            margin-bottom: 0.5rem;
            opacity: 0.8;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        
        .footer-section a:hover {
            opacity: 1;
        }
        
        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .social-links a {
            font-size: 1.5rem;
        }
        
        .copyright {
            text-align: center;
            padding-top: 2rem;
            margin-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            opacity: 0.7;
        }
        
        /* Notification */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c7cb0;
            color: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none;
            z-index: 1002;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }
            
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .hero h1 {
                font-size: 2rem;
            }
            
            .book-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- I'm not including the entire body for brevity -->
    <h1>Your content will go here</h1>
</body>
</html>
